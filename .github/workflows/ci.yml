name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"
  GOLANGCI_LINT_VERSION: "latest"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go (unified module) ─────────────────────────────────────────────────────
  go:
    name: Go — lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Test (race detector enabled)
        run: go test -race ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  # ── govulncheck (Go vulnerability scanner) ──────────────────────────────────
  govulncheck:
    name: Go — govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ── Frontend (Vue 3 + pnpm) ─────────────────────────────────────────────────
  frontend:
    name: Frontend — lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        # Ignore interactive build-script approval in CI (pnpm requires manual approval in non-interactive mode).
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        working-directory: frontend
        run: pnpm run lint

      - name: Type-check + build
        working-directory: frontend
        run: pnpm run build

      - name: Test
        working-directory: frontend
        run: pnpm test

  # ── Frontend security audit ─────────────────────────────────────────────────
  frontend-audit:
    name: Frontend — pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        # Ignore interactive build-script approval in CI (pnpm requires manual approval in non-interactive mode).
        run: pnpm install --frozen-lockfile --ignore-scripts

      # TODO: drop continue-on-error once the dependency tree is clean enough
      # that transient advisories no longer break PRs. We keep --audit-level=high
      # to filter out dev-dep noise at lower severities.
      - name: pnpm audit (high+)
        working-directory: frontend
        continue-on-error: true
        run: pnpm audit --audit-level=high

  # ── Dependency review (PRs only) ────────────────────────────────────────────
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5.0.0
        continue-on-error: true
        with:
          fail-on-severity: high
