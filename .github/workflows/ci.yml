name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "20"
  GOLANGCI_LINT_VERSION: "latest"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend (Go + OpenCV via container; no local install) ───────────────────
  backend:
    name: Backend — lint, test, build
    runs-on: ubuntu-latest
    container:
      image: gocv/opencv:4.10.0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Test
        working-directory: backend
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: backend
          args: --timeout=5m

  # ── zefix-tools (Go) ─────────────────────────────────────────────────────────
  zefix-tools:
    name: zefix-tools — lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: zefix-tools/go.sum

      - name: Build
        working-directory: zefix-tools
        run: go build ./...

      - name: Test
        working-directory: zefix-tools
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: zefix-tools
          args: --timeout=5m

  # ── Frontend (Vue 3 + pnpm) ─────────────────────────────────────────────────
  frontend:
    name: Frontend — lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm run lint

      - name: Type-check + build
        working-directory: frontend
        run: pnpm run build

      - name: Test
        working-directory: frontend
        run: pnpm test

  # ── Helm chart lint ─────────────────────────────────────────────────────────
  helm:
    name: Helm chart — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: Add Helm repos
        run: |
          helm repo add opensearch https://opensearch-project.github.io/helm-charts/
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm repo update
      - name: Helm dependency build
        working-directory: helm/odi
        run: helm dependency build
      - name: Helm lint
        working-directory: helm/odi
        run: helm lint .
