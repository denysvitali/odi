{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "odi.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "odi.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range .Values.gateway.parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
    {{- end }}
  {{- if .Values.gateway.hostnames }}
  hostnames:
    {{- range .Values.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    # API traffic — route to backend.
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ include "odi.backend.name" . }}
          port: {{ .Values.backend.service.port }}
    {{- if .Values.frontend.enabled }}
    # All other traffic — route to frontend (Vue SPA).
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "odi.frontend.name" . }}
          port: {{ .Values.frontend.service.port }}
    {{- end }}
{{- end }}
